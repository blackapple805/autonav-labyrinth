<!doctype html>
<meta charset="utf-8" />
<title>AutoNav — maze exploration (no map)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!--
  Replays a frontier-exploration run produced by the C++ stack. The robot was
  given no map and no goal location; it built its own map from lidar and
  explored until it found the exit. This page reveals that map as it was
  discovered (fog of war), so you watch the maze appear as the robot learns it.
-->
<style>
  :root {
    --bg:#07090d; --panel:#0d1119; --grid:#16202c; --ink:#c9d6e2; --dim:#5b6b7c;
    --unknown:#0d1117; --free:#d9d6c8; --wall:#226639; --trace:#ff7a3c;
    --robot:#eaf6ff; --goal:#19e3c2; --start:#6ad7ff; --accent:#19e3c2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink);
    font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .wrap { display: grid; grid-template-columns: 1fr 220px; gap: 1px;
    background: var(--grid); height: 100%; }
  @media (max-width: 720px) { .wrap { grid-template-columns: 1fr; grid-template-rows: 1fr auto; } }
  .stage { background: var(--bg); position: relative; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
  .hud { background: var(--panel); padding: 16px; display: flex;
    flex-direction: column; gap: 14px; }
  .title { letter-spacing: .2em; font-size: 11px; color: var(--dim); text-transform: uppercase; }
  .title b { color: var(--accent); font-weight: 600; }
  .k { font-size: 9px; letter-spacing: .14em; color: var(--dim); text-transform: uppercase; }
  .v { font-size: 19px; color: var(--ink); font-variant-numeric: tabular-nums; }
  .v small { font-size: 11px; color: var(--dim); }
  .bar { height: 4px; background: var(--grid); border-radius: 2px; overflow: hidden; }
  .bar i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .1s; }
  .legend { display: flex; flex-direction: column; gap: 6px; font-size: 10px; color: var(--dim); }
  .legend div { display: flex; align-items: center; gap: 8px; }
  .sw { width: 12px; height: 12px; border-radius: 2px; }
  .controls { margin-top: auto; display: flex; gap: 6px; }
  button { flex: 1; background: transparent; color: var(--ink); border: 1px solid var(--grid);
    padding: 9px; font: inherit; font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    cursor: pointer; border-radius: 3px; }
  button:hover { border-color: var(--accent); color: var(--accent); }
  .err { color: #ff3d6e; font-size: 12px; padding: 20px; line-height: 1.7; white-space: pre-wrap; }
  .note { font-size: 10px; color: var(--dim); line-height: 1.5; }
</style>

<div class="wrap">
  <div class="stage"><canvas id="cv"></canvas></div>
  <aside class="hud">
    <div class="title">AUTO<b>NAV</b> · exploration</div>
    <div class="note">No map given. The robot maps the maze from its lidar and explores until it finds the exit.</div>
    <div><div class="k">Explore time</div><div class="v"><span id="t">0.0</span><small> s</small></div></div>
    <div><div class="k">Maze discovered</div><div class="v"><span id="disc">0</span><small> %</small></div></div>
    <div class="bar"><i id="prog"></i></div>
    <div><div class="k">Status</div><div class="v" id="status" style="font-size:14px">exploring…</div></div>
    <div class="legend">
      <div><span class="sw" style="background:var(--free)"></span>discovered path</div>
      <div><span class="sw" style="background:var(--wall)"></span>discovered hedge</div>
      <div><span class="sw" style="background:var(--unknown);border:1px solid var(--grid)"></span>unexplored</div>
      <div><span class="sw" style="background:var(--trace)"></span>robot trail</div>
    </div>
    <div class="controls">
      <button id="replay">↻ replay</button>
      <button id="pause">❙❙</button>
    </div>
  </aside>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const el = id => document.getElementById(id);
const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();

let RUN = null, frame = 0, playing = true, dpr = 1;
let known = null;     // Int8Array of revealed map cells (0 unknown,1 free,2 wall)
let knownUpto = -1;   // highest frame index whose reveals are applied

function showError(msg) {
  document.querySelector('.stage').innerHTML = '<div class="err">' + msg + '</div>';
}

async function load() {
  let text;
  try {
    const res = await fetch('explore_run.json');
    if (!res.ok) {
      showError('Could not fetch explore_run.json (HTTP ' + res.status + ').\n\n' +
        'Generate it first:\n\n  make explore-web\n  cd web && python -m http.server');
      return;
    }
    text = await res.text();
  } catch (e) {
    showError('Network error:\n\n' + e.message +
      '\n\nServe the folder over http (python -m http.server),\nnot the file directly.');
    return;
  }
  try { RUN = JSON.parse(text); }
  catch (e) {
    showError('explore_run.json is not valid JSON:\n\n' + e.message +
      '\n\nIf you used PowerShell > redirect, regenerate with:\n' +
      '  .\\build\\gen_explore_data.exe | Out-File explore_run.json -Encoding ascii');
    return;
  }
  if (!RUN.map || !Array.isArray(RUN.frames) || RUN.frames.length === 0) {
    showError('explore_run.json loaded but is missing map/frames.');
    return;
  }
  known = new Int8Array(RUN.map.cols * RUN.map.rows);
  resize();
  requestAnimationFrame(tick);
}

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  const r = cv.getBoundingClientRect();
  cv.width = Math.max(1, r.width * dpr);
  cv.height = Math.max(1, r.height * dpr);
}
window.addEventListener('resize', resize);

function transform() {
  const W = RUN.world.w, H = RUN.world.h, pad = 16 * dpr;
  const s = Math.min((cv.width - pad * 2) / W, (cv.height - pad * 2) / H);
  const ox = (cv.width - s * W) / 2, oy = (cv.height - s * H) / 2;
  return { s, px: x => ox + x * s, py: y => cv.height - (oy + y * s) };
}

// Rebuild the known map up to the current frame (applying reveal deltas).
function syncKnown() {
  if (frame < knownUpto) { known.fill(0); knownUpto = -1; }  // rewound
  for (let f = knownUpto + 1; f <= frame; f++) {
    const rv = RUN.frames[f].reveal;
    for (const [mx, my, s] of rv) known[my * RUN.map.cols + mx] = s;
  }
  knownUpto = frame;
}

function draw() {
  const T = transform();
  syncKnown();
  ctx.fillStyle = css('--unknown');
  ctx.fillRect(0, 0, cv.width, cv.height);

  const cell = RUN.map.cell, cols = RUN.map.cols, rows = RUN.map.rows;
  const cw = cell * T.s;
  for (let my = 0; my < rows; my++) {
    for (let mx = 0; mx < cols; mx++) {
      const s = known[my * cols + mx];
      if (s === 0) continue;  // unknown stays dark
      ctx.fillStyle = (s === 2) ? css('--wall') : css('--free');
      const wx = mx * cell, wy = my * cell;
      ctx.fillRect(T.px(wx), T.py(wy + cell), cw + 1, cw + 1);
    }
  }

  // start + goal markers (goal shown only once discovered would be stricter,
  // but we mark it faintly so the viewer can see where it ends up)
  const [gx, gy] = RUN.goal, gxp = T.px(gx), gyp = T.py(gy), gr = 8 * dpr;
  ctx.strokeStyle = css('--goal'); ctx.lineWidth = 2 * dpr; ctx.globalAlpha = .9;
  ctx.beginPath(); ctx.arc(gxp, gyp, gr, 0, 7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(gxp - gr, gyp); ctx.lineTo(gxp + gr, gyp);
  ctx.moveTo(gxp, gyp - gr); ctx.lineTo(gxp, gyp + gr); ctx.stroke();
  ctx.globalAlpha = 1;
  const [sx, sy] = RUN.start;
  ctx.fillStyle = css('--start');
  ctx.beginPath(); ctx.arc(T.px(sx), T.py(sy), 4 * dpr, 0, 7); ctx.fill();

  // robot trail up to current frame
  ctx.strokeStyle = css('--trace'); ctx.lineWidth = 2 * dpr;
  ctx.beginPath();
  for (let i = 0; i <= frame; i++) {
    const f = RUN.frames[i];
    i ? ctx.lineTo(T.px(f.x), T.py(f.y)) : ctx.moveTo(T.px(f.x), T.py(f.y));
  }
  ctx.stroke();

  // robot
  const f = RUN.frames[frame];
  const rx = T.px(f.x), ry = T.py(f.y), rr = 5 * dpr;
  ctx.fillStyle = css('--robot');
  ctx.shadowColor = css('--accent'); ctx.shadowBlur = 12 * dpr;
  ctx.beginPath(); ctx.arc(rx, ry, rr, 0, 7); ctx.fill(); ctx.shadowBlur = 0;
  ctx.strokeStyle = css('--bg'); ctx.lineWidth = 2 * dpr;
  ctx.beginPath(); ctx.moveTo(rx, ry);
  ctx.lineTo(rx + Math.cos(f.t) * rr, ry - Math.sin(f.t) * rr); ctx.stroke();

  // telemetry
  const dt = RUN.explore_time / (RUN.frames.length - 1);
  el('t').textContent = (frame * dt).toFixed(1);
  let kn = 0; for (let i = 0; i < known.length; i++) if (known[i] !== 0) kn++;
  el('disc').textContent = Math.round(100 * kn / known.length);
  el('prog').style.width = (100 * frame / (RUN.frames.length - 1)) + '%';
  const atEnd = frame >= RUN.frames.length - 1;
  el('status').textContent = atEnd ? (RUN.found ? 'exit found ✓' : 'explored') : 'exploring…';
  el('status').style.color = atEnd && RUN.found ? css('--goal') : css('--ink');
}

let last = 0;
function tick(ts) {
  if (!RUN) return;
  if (playing && ts - last > 33) {
    last = ts;
    draw();
    if (frame < RUN.frames.length - 1) frame++;
  }
  requestAnimationFrame(tick);
}

el('replay').onclick = () => { frame = 0; known.fill(0); knownUpto = -1; playing = true; el('pause').textContent = '❙❙'; };
el('pause').onclick = () => { playing = !playing; el('pause').textContent = playing ? '❙❙' : '▶'; };

load();
</script>
